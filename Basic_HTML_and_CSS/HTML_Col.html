<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="Author" content="Keith Heffington">
    <title>COL TAG CHALLENGE</title>
    <style>
        table, td {
            border: 2px solid black;
            border-collapse: collapse;
        }
        td {
            padding: 10px;
            color: white;
        }
    </style>
</head>
<body>
    <h1>COL TAG CHALLENGE</h1>
   <table>
    <colgroup>
        <col span="2" style="background-color: #77c51e;">
        <col style="background-color: blue">
    </colgroup>
    <tr>
        <td>Row 1, Cell 1</td>
        <td>Row 1, Cell 2</td>
        <td>Row 1, Cell 3</td>
    </tr>
    <tr>
        <td>Row 2, Cell 1</td>
        <td>Row 2, Cell 2</td>
        <td>Row 2, Cell 3</td>
    </tr>
</table> 
<p>Created a table with col tags</p>
<p>First col is cell 1 & cell 2</p>
<p>Second col is cell 3</p>
</body>
</html>
